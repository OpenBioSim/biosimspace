name: Release Devel

on:
  workflow_dispatch:
  push:
    branches: [devel]

jobs:
  build:
    name: build (${{ matrix.python-version }}, ${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      max-parallel: 9
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        platform:
          - { name: "windows", os: "windows-latest", shell: "bash -l {0}" }
          - { name: "linux", os: "ubuntu-latest", shell: "bash -l {0}" }
          - { name: "macos", os: "macos-latest", shell: "bash -l {0}" }
        exclude:
          - platform:
              { name: "macos", os: "macos-latest", shell: "bash -l {0}" }
            python-version: "3.12"  # MacOS can't run 3.12 yet... We want 3.10 and 3.11
          - platform: { name: "windows", os: "windows-latest", shell: "bash -l {0}" }
            python-version: "3.10"
          - platform: { name: "windows", os: "windows-latest", shell: "bash -l {0}" }
            python-version: "3.11"
    environment:
      name: biosimspace-build
    defaults:
      run:
        shell: ${{ matrix.platform.shell }}
    env:
      SIRE_DONT_PHONEHOME: 1
      SIRE_SILENT_PHONEHOME: 1
    steps:
      #
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      #
      - name: Compute version info
        run: python ${{ github.workspace }}/actions/update_recipe.py
      #
      - name: Create source tarball
        run: tar --exclude='.git' -czf /tmp/biosimspace-source.tar.gz . && mv /tmp/biosimspace-source.tar.gz .
        working-directory: ${{ github.workspace }}
      #
      - name: Install rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          tool-version: latest
          build-args: --help
      #
      - name: Write Python variant config
        shell: bash
        run: printf 'python:\n  - "${{ matrix.python-version }}"\n' > "${{ github.workspace }}/python_variant.yaml"
      #
      - name: Build package using rattler-build
        shell: bash
        run: rattler-build build --recipe "${{ github.workspace }}/recipes/biosimspace" -c conda-forge -c openbiosim/label/dev --variant-config "${{ github.workspace }}/python_variant.yaml"
      #
      - name: Install anaconda-client
        run: python -m pip install anaconda-client
      #
      - name: Upload package
        run: python ${{ github.workspace }}/actions/upload_package.py
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          ANACONDA_LABEL: dev
